<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="icon" href="data:,">

    <link rel="stylesheet" href="../css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
   
</head>
<body> 
    <button onclick="toggleNav()"><img class="btn-menu" src="../img/menu-bar.png" alt="Menu"></button>

    <div class="overlay" id="overlay"></div>
    
     <div id="mySidenav" class="slide-menu">
            <h1><b>LifeFlow</b></h1>
            <div id="user-profile-area"></div>
            <a href="../index.html"><span class="glyphicon glyphicon-pencil" aria-hidden="true"></span><b>  HOME</b></a>
            <a href="login.html"><span class="glyphicon glyphicon-search" aria-hidden="true"></span><b>  LOGIN</b></a>
        </div>

    <div class="dashboard-content">
        <div class="chart-box">
            <canvas id="myPieChart"></canvas>
        </div>
        <div class="calendar-box">
            <div id="calendar"></div>
        </div>
    </div>

    <!-- Modal para Nova Tarefa/Evento -->
    <div id="modalCadastro" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="fecharModal()">&times;</span>
            <h3>Novo Cadastro</h3>
            <form id="formCadastro">
                <label>Tipo:</label>
                <select id="modalTipo">
                    <option value="T">Tarefa</option>
                    <option value="E">Evento</option>
                </select>
                <label>Título:</label>
                <input type="text" id="modalTitulo" placeholder="Ex: Estudar Java" required>
                <label>Descrição:</label>
                <textarea id="modalDescricao" placeholder="Opcional"></textarea>
                <label>Prioridade:</label>
                <select id="modalPrioridade">
                    <option value="Baixa">Baixa</option>
                    <option value="Media" selected>Média</option>
                    <option value="Alta">Alta</option>
                </select>
                <button type="submit">Salvar</button>
            </form>
        </div>
    </div>

    <script src="../js/global-auth.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
