<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="login-screen">
        <div class="welcome-side">
            <img src="../img/Login.jpg" alt="Ilustração" class="welcome-img">
            <h1 class="welcome-title">Seja Bem Vindo!</h1> 
            <p class="welcome-text">Organize a sua vida em poucos instantes</p> 
        </div>
        <div class="login-container">
            <p class="texto-login">Faça seu login para continuar</p> 

            <form class="login-form" id="loginForm">
                <input type="email" id="email" placeholder="Digite seu e-mail" class="input-field"> 
                <input type="password" id="password" placeholder="Digite sua senha" class="input-field"> 
                <div id="error-message" class="error-message"></div>
                <button type="submit" class="btn-continue">Continue -></button> 
            </form>
    
            <a href="cadastro.html" class="cadastro-link">Clique aqui para criar uma conta</a> 
        </div>
    </div>
    <p><a href="../index.html">Voltar</a></p>
    
    <script src="../js/login.js"></script>
</body>
</html>
